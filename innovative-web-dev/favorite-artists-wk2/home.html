<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Artists</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light">
    <style>
        body {
            background: url('images/background_img.jpeg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Favorite Female Artists🎤</h1>
        </div>

        <div class="row g-4">

            <div class="col-sm-4">
                <div class="card bg-secondary text-light shadow">
                    <img src="images/swift_img.jpeg" class="image" alt="singers" />
                    <div class="card-body text-center">
                        <p class="card-text">The perfect mix of pop and R&B</p>
                    </div>
                </div>
            </div>

            <div class="col-sm-8">
                <div class="card shadow">
                    <div class="card-body">

                        <h5 class="card-title mb-3">Top Artists</h5>

                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Name</th>
                                        <th>Favorite Song</th>
                                        <th>Date of Birth</th>
                                    </tr>
                                </thead>

                                <tbody id="tableBody"></tbody>

                            </table>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>

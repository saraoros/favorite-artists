<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite Artists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: url('images/background_img.jpeg') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>

<body class="text-light">
    <main class="container py-5">
        <h1 class="fw-bold text-center mb-5">Favorite Female Artists 🎤</h1>

        <section class="row g-4">
            <section class="col-sm-4">
                <article class="card bg-secondary text-light shadow">
                    <img src="images/swift_img.jpeg" class="img-fluid rounded card-img-top"
                        alt="Purple and Pink background image" />
                    <p class="card-text text-center p-3 mb-0">The perfect mix of pop and R&B</p>
                </article>
            </section>

            <section class="col-sm-8">
                <article class="card shadow">
                    <h5 class="card-title p-2 pb-0 text-dark text-center">Top Artists</h5>
                    <table class="table align-middle mb-0">
                        <thead class="table-info">
                            <tr>
                                <th>Name</th>
                                <th>Favorite Song</th>
                                <th>Date of Birth</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </article>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
